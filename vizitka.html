<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Елена Леонидовна — Эксперт по нейросотрудникам</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Raleway:wght@300;400;500;600&display=swap');

  :root {
    --neon1: #00d4ff;
    --neon2: #a855f7;
    --neon3: #7c3aed;
    --glow1: rgba(0,212,255,0.4);
    --glow2: rgba(168,85,247,0.4);
    --text-dark: #1a1a2e;
    --text-mid: #3d3d6b;
    --bg: #f0f4ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Raleway", sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-layer {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 15% 50%, rgba(0,212,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 85% 20%, rgba(168,85,247,0.07) 0%, transparent 55%),
      radial-gradient(ellipse 40% 40% at 70% 80%, rgba(124,58,237,0.06) 0%, transparent 50%),
      linear-gradient(145deg, #f0f4ff 0%, #e8eeff 40%, #f5f0ff 70%, #eef5ff 100%);
    z-index: 0;
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.25;
    animation: float 8s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 300px; height: 300px; background: var(--neon1); top: 5%; left: -80px; animation-delay: 0s; }
  .orb2 { width: 250px; height: 250px; background: var(--neon2); bottom: 10%; right: -60px; animation-delay: -3s; }
  .orb3 { width: 180px; height: 180px; background: var(--neon3); top: 55%; left: 35%; animation-delay: -6s; }

  @keyframes float {
    0%, 100% { transform: translateY(0px) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
  }

  .grid-lines {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
  }

  /* ── CARD: горизонтальный flex, контент слева, фото справа ── */
  .card {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: row;        /* явно горизонтально */
    align-items: stretch;
  }

  /* Контент — левая колонка */
  .content {
    flex: 1 1 0;
    padding: 60px 20px 60px 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* Фото — правая колонка */
  .photo-section {
    position: relative;
    width: 42%;
    flex-shrink: 0;
    overflow: hidden;
  }

  .photo-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  /* Fade: фото тает влево, переходя в контент */
  .photo-fade {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to left,
      transparent 0%,
      transparent 40%,
      rgba(240,244,255,0.35) 60%,
      rgba(240,244,255,0.80) 80%,
      rgba(240,244,255,0.97) 95%,
      #f0f4ff 100%
    );
  }

  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .name {
    font-family: "Cormorant Garamond", serif;
    font-size: clamp(2.8rem, 4.5vw, 5rem);
    font-weight: 700;
    line-height: 1.1;
    background: linear-gradient(90deg, #00d4ff, #a855f7, #7c3aed, #00d4ff, #a855f7);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 4s ease infinite;
    filter: drop-shadow(0 0 20px rgba(0,212,255,0.3)) drop-shadow(0 0 40px rgba(168,85,247,0.2));
    margin-bottom: 8px;
  }

  .name-sub {
    font-size: clamp(0.8rem, 1.2vw, 1rem);
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-mid);
    opacity: 0.7;
    margin-bottom: 24px;
  }

  .divider {
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, var(--neon1), var(--neon2));
    border-radius: 2px;
    margin-bottom: 28px;
    box-shadow: 0 0 12px var(--glow1);
    animation: pulseW 3s ease-in-out infinite;
  }
  @keyframes pulseW {
    0%, 100% { width: 80px; box-shadow: 0 0 12px var(--glow1); }
    50%       { width: 120px; box-shadow: 0 0 20px var(--glow2); }
  }

  .specialization {
    font-size: clamp(1rem, 1.6vw, 1.3rem);
    font-weight: 400;
    color: var(--text-dark);
    line-height: 1.55;
    max-width: 480px;
    margin-bottom: 36px;
  }

  .highlight-word {
    background: linear-gradient(90deg, #00d4ff, #a855f7, #7c3aed, #00d4ff);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 4s ease infinite;
    font-weight: 600;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 40px;
  }

  .tag {
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    border: 1px solid rgba(0,212,255,0.3);
    color: var(--text-mid);
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    cursor: default;
  }
  .tag:hover {
    border-color: var(--neon1);
    color: var(--neon2);
    box-shadow: 0 0 15px var(--glow1), 0 0 30px rgba(0,212,255,0.1);
    background: rgba(255,255,255,0.9);
    transform: translateY(-2px);
  }

  .social-row {
    display: flex;
    gap: 18px;
    align-items: center;
    margin-bottom: 40px;
  }

  .social-link {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.7);
    border: 1.5px solid rgba(168,85,247,0.25);
    backdrop-filter: blur(10px);
    transition: all 0.35s ease;
    text-decoration: none;
    position: relative;
    overflow: hidden;
  }
  .social-link::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--neon1), var(--neon2));
    opacity: 0;
    transition: opacity 0.35s ease;
  }
  .social-link:hover {
    transform: translateY(-4px) scale(1.08);
    border-color: transparent;
    box-shadow: 0 8px 30px var(--glow2), 0 0 0 1px rgba(168,85,247,0.3);
  }
  .social-link:hover::before { opacity: 1; }
  .social-link svg {
    position: relative;
    z-index: 1;
    width: 24px;
    height: 24px;
    fill: var(--neon2);
    transition: fill 0.3s ease;
  }
  .social-link:hover svg { fill: white; }

  .btn-wrap {
    position: relative;
    display: inline-block;
  }
  .btn-wrap::before {
    content: "";
    position: absolute;
    inset: -6px;
    border-radius: 60px;
    border: 2px solid rgba(168,85,247,0.4);
    animation: pulseRing 2.5s ease-out infinite;
  }
  @keyframes pulseRing {
    0%   { transform: scale(0.95); opacity: 0.8; }
    70%  { transform: scale(1.06); opacity: 0; }
    100% { transform: scale(1.06); opacity: 0; }
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 16px 36px;
    border-radius: 50px;
    background: linear-gradient(135deg, var(--neon1), var(--neon2), var(--neon3));
    background-size: 200% 200%;
    animation: gradientShift 4s ease infinite;
    color: white;
    font-family: "Raleway", sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-decoration: none;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 20px var(--glow2), 0 0 40px rgba(0,212,255,0.15);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .cta-btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 8px 40px var(--glow2), 0 0 60px rgba(0,212,255,0.2);
  }
  .cta-btn svg { width: 20px; height: 20px; fill: white; }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    .card {
      flex-direction: column-reverse;  /* на мобиле: фото сверху, контент снизу */
    }
    .photo-section {
      width: 100%;
      height: 70vw;
      max-height: 400px;
    }
    .photo-fade {
      background: linear-gradient(
        to bottom,
        transparent 0%,
        transparent 50%,
        rgba(240,244,255,0.6) 75%,
        rgba(240,244,255,0.97) 92%,
        #f0f4ff 100%
      );
    }
    .content {
      padding: 32px 24px 50px;
    }
  }

  @media (max-width: 420px) {
    .name { font-size: 2rem; }
    .cta-btn { padding: 14px 24px; font-size: 0.9rem; }
  }
</style>
</head>
